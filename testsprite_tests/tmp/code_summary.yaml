version: "1.0"
project:
  name: "Smart Bharat AI"
  description: "AI-powered Next-Gen Citizen Platform for Government Schemes, Foundational IDs, Civic Complaints, and 24/7 Policy Assistance."
  architecture: "Monorepo (Next.js 15 App Router Frontend + Express TypeScript Backend + Shared Types)"

tech_stack:
  frontend:
    framework: "Next.js 15.1.7 (App Router)"
    library: "React 19.0.0"
    language: "TypeScript 5.x"
    styling: "Tailwind CSS 3.4.1"
    animations: "Framer Motion, WebGL Shaders"
  backend:
    runtime: "Node.js 24.x"
    framework: "Express 4.21.2"
    language: "TypeScript 5.x"
    auth: "JSON Web Token (JWT) & bcryptjs"
  shared:
    package: "@smart-bharat/shared"

features:
  - id: "dashboard"
    name: "Dashboard & Hero Showcase"
    description: "Main landing page with interactive 3D hero video, quick access to services, and system metrics."
    path: "/"

  - id: "schemes"
    name: "Government Schemes Discovery & Search"
    description: "Search and filter 500+ Central and State Government Schemes by domain, eligibility, and financial benefits."
    path: "/schemes"

  - id: "scheme_detail"
    name: "Scheme Detail & Application Guidance"
    description: "Deep dive view of specific government schemes with eligibility rules, required documents, and official portal links."
    path: "/schemes/[id]"

  - id: "ids"
    name: "Foundational Government IDs Portal"
    description: "Guide and application assistant for Aadhaar Card, PAN Card, Voter ID, Passport, Driving License, Ration Card."
    path: "/ids font"

  - id: "id_detail"
    name: "Government ID Application Form"
    description: "Interactive application wizard with auto pre-fill and document validation for specific IDs."
    path: "/ids/[id]"

  - id: "complaints"
    name: "Civic Complaints & Issue Routing"
    description: "Report civic issues (road damage, water leakage, power cuts, garbage overflow) with AI auto-routing to PWD, Jal Board, Power Corp."
    path: "/complaints"

  - id: "assistant"
    name: "24/7 AI Policy Assistant"
    description: "AI conversational interface for citizen queries, policy explanation, scheme eligibility check, and document guidance."
    path: "/assistant"

  - id: "credentials"
    name: "Verified Credential Vault"
    description: "Digital wallet for storing verified document numbers, tracking status, and exporting credentials."
    path: "/credentials"

api_endpoints:
  - method: "GET"
    path: "/api/health"
    description: "Server health check"
  - method: "POST"
    path: "/api/auth/register"
    description: "User account registration"
  - method: "POST"
    path: "/api/auth/login"
    description: "User authentication"
  - method: "GET"
    path: "/api/auth/me"
    description: "Fetch current user profile"
  - method: "GET"
    path: "/api/schemes"
    description: "Fetch government schemes list"
  - method: "GET"
    path: "/api/schemes/:id"
    description: "Fetch scheme details by ID"
  - method: "POST"
    path: "/api/schemes/match"
    description: "AI scheme matching for user profile"
  - method: "GET"
    path: "/api/ids"
    description: "Fetch government IDs list"
  - method: "GET"
    path: "/api/ids/:id"
    description: "Fetch ID details and required fields"
  - method: "POST"
    path: "/api/complaints"
    description: "Submit civic complaint ticket"
  - method: "GET"
    path: "/api/complaints/track/:id"
    description: "Track complaint status"
  - method: "POST"
    path: "/api/ai/chat"
    description: "Send prompt to AI policy assistant"
  - method: "GET"
    path: "/api/credentials"
    description: "Fetch user saved credentials"
